{% extends "layout.html" %}

{% block content %}
<div class="app-container">
    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-robot"></i> Harsha's AI</div>
        
        <button onclick="clearChat()" class="btn-clear">
            <i class="fa-solid fa-trash"></i> Clear Chat
        </button>
        
        <div class="user-info">
            <i class="fa-solid fa-user"></i> {{ username }}
            <a href="{{ url_for('logout') }}" style="color: #ff5f5f; margin-left: 10px;">
                <i class="fa-solid fa-right-from-bracket"></i>
            </a>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h3>Harsha's AI Assistant</h3>
        </div>
        
        <div class="messages-container" id="messages">
            <div class="message bot">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble">Hello! I am Harsha's AI. How can I help you today?</div>
            </div>

            {% for chat in history|reverse %}
                <div class="message user">
                    <div class="bubble">{{ chat.message }}</div>
                </div>
                <div class="message bot">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">{{ chat.response }}</div>
                </div>
            {% endfor %}
        </div>

        <div class="input-area">
            <button id="voice-btn" onclick="startVoice()">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}
